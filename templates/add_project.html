<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Project - FreeLanceOS</title>
</head>
<body>
    <h2>Add New Freelance Project</h2>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <p style="color: red;">{{ message }}</p>
        {% endfor %}
      {% endif %}
    {% endwith %}
    
    <form method="POST">
        <label>Client Name:</label><br>
        <input type="text" name="client_name" placeholder="e.g. Acme Corp" required><br><br>
        
        <label>Project Title:</label><br>
        <input type="text" name="project_title" placeholder="e.g. Website Development" required><br><br>
        
        <label>Budget ($):</label><br>
        <input type="number" step="0.01" min="0.01" name="budget" placeholder="e.g. 1500.00" required><br><br>

        <label>Deadline:</label><br>
        <input type="date" name="deadline" required><br><br>
        
        <button type="submit">Save Project</button>
    </form>
    
    <br>
    <a href="/dashboard">Back to Dashboard</a>
</body>
</html>
