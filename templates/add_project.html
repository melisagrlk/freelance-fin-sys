<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Project - FreeLanceOS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div style="display: flex; align-items: center; justify-content: center; min-height: 90vh; width: 100%;">
        <div class="container" style="max-width: 500px; padding: 40px 30px;">
            <h2 style="text-align: center; margin-bottom: 25px;">Create New Project</h2>
            
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <p style="color: var(--danger); background: rgba(247, 90, 104, 0.1); padding: 10px; border-radius: 4px; font-size: 14px; text-align: center;">{{ message }}</p>
                {% endfor %}
              {% endif %}
            {% endwith %}
            
            <form method="POST">
                <div style="margin-bottom: 15px;">
                    <label style="color: var(--text-muted); display: block; margin-bottom: 5px;">Category:</label>
                    <select name="category" style="width: 100%; padding: 10px; background: #121214; border: 1px solid var(--border); border-radius: 4px; color: #fff;">
                        <option value="Software & Tech">Software & Tech</option>
                        <option value="Engineering & CAD">Engineering & CAD (AutoCAD, Electronics etc.)</option>
                        <option value="Design & Creative">Design & Creative (UI/UX, Logo, Video Editing)</option>
                        <option value="Writing & Translation">Writing & Translation (Articles, Content Creation)</option>
                        <option value="Marketing & Social Media">Marketing & Social Media Management</option>
                        <option value="Consulting & Tuition">Consulting & Academic Tuition</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div style="margin-bottom: 15px;">
                    <label style="color: var(--text-muted); display: block; margin-bottom: 5px;">Client Name:</label>
                    <input type="text" name="client_name" placeholder="e.g. Acme Corp" required>
                </div>
                
                <div style="margin-bottom: 15px;">
                    <label style="color: var(--text-muted); display: block; margin-bottom: 5px;">Project Title:</label>
                    <input type="text" name="project_title" placeholder="e.g. AutoCAD Drawing or Website" required>
                </div>
                
                <div style="margin-bottom: 15px;">
                    <label style="color: var(--text-muted); display: block; margin-bottom: 5px;">Budget ($):</label>
                    <input type="number" step="0.01" min="0.01" name="budget" placeholder="e.g. 1500.00" required>
                </div>
                
                <div style="margin-bottom: 25px;">
                    <label style="color: var(--text-muted); display: block; margin-bottom: 5px;">Deadline:</label>
                    <input type="date" name="deadline" required>
                </div>
                
                <button type="submit" style="width: 100%; padding: 12px; font-size: 16px; margin-bottom: 15px;">Save Project</button>
            </form>
            
            <div style="text-align: center;">
                <a href="/dashboard" style="color: var(--text-muted); font-size: 14px;">← Cancel and Go Back</a>
            </div>
        </div>
    </div>
</body>
</html>
