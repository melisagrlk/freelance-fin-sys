<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Project - FreeLanceOS</title>
</head>
<body>
    <h2>Edit Project Details</h2>
    
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <p style="color: red;">{{ message }}</p>
        {% endfor %}
      {% endif %}
    {% endwith %}
    
    <form method="POST">
        <label>Client Name:</label><br>
        <input type="text" name="client_name" value="{{ project['client_name'] }}" required><br><br>
        
        <label>Project Title:</label><br>
        <input type="text" name="project_title" value="{{ project['project_title'] }}" required><br><br>
        
        <label>Budget ($):</label><br>
        <input type="number" step="0.01" min="0.01" name="budget" value="{{ project['budget'] }}" required><br><br>
        
        <label>Deadline:</label><br>
        <input type="date" name="deadline" value="{{ project['deadline'] }}" required><br><br>
        
        <button type="submit">Update Project</button>
    </form>
    
    <br>
    <a href="/dashboard">Cancel and Go Back</a>
</body>
</html>
