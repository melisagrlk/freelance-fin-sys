<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FreeLanceOS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div style="display: flex; align-items: center; justify-content: center; min-height: 90vh; width: 100%;">
        <div class="container" style="max-width: 400px; padding: 40px 30px;">
            <h2 style="text-align: center; margin-bottom: 25px; color: #fff;">Sign In to FreeLanceOS</h2>
            
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <p style="color: var(--danger); background: rgba(247, 90, 104, 0.1); padding: 10px; border-radius: 4px; font-size: 14px; text-align: center;">{{ message }}</p>
                -- {% endfor %}
              {% endif %}
            {% endwith %}
            
            <form method="POST">
                <div style="margin-bottom: 15px;">
                    <label style="color: var(--text-muted); display: block; margin-bottom: 5px;">Username:</label>
                    <input type="text" name="username" placeholder="Enter your username" required>
                </div>
                
                <div style="margin-bottom: 25px;">
                    <label style="color: var(--text-muted); display: block; margin-bottom: 5px;">Password:</label>
                    <input type="password" name="password" placeholder="Enter your password" required>
                </div>
                
                <button type="submit" style="width: 100%; padding: 12px; font-size: 16px; margin-bottom: 20px;">Login</button>
            </form>
            
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 0; font-size: 14px;">
                Don't have an account? <a href="/register">Register here</a>
            </p>
        </div>
    </div>
</body>
</html>
